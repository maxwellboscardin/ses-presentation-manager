<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Brochure — SES Presentations</title>
  <style>
    @font-face { font-family: 'Gilroy'; src: url('../fonts/Gilroy-Regular.otf'); font-weight: 400; }
    @font-face { font-family: 'Gilroy'; src: url('../fonts/Gilroy-Medium.otf'); font-weight: 500; }
    @font-face { font-family: 'Gilroy'; src: url('../fonts/Gilroy-SemiBold.otf'); font-weight: 600; }
    @font-face { font-family: 'Gilroy'; src: url('../fonts/Gilroy-Bold.otf'); font-weight: 700; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Gilroy', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .content { display: flex; flex-direction: column; gap: 24px; width: 100%; max-width: 1220px; align-items: center; }

    .presentations { display: flex; gap: 24px; flex-wrap: nowrap; justify-content: center; }

    .cover-link {
      display: block;
      text-decoration: none;
      color: inherit;
      width: 180px;
      transition: transform 0.2s;
    }
    .cover-link:hover {
      transform: translateY(-6px);
    }
    .cover-link:hover .cover-thumb {
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    .cover-thumb {
      width: 180px;
      height: 233px;
      background: url('../assets/bg-cover.png') center / cover no-repeat;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.2s;
    }

    .cover-thumb__card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(10,83,131,0.12);
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      max-width: 140px;
    }

    .cover-thumb__logo { height: 18px; width: auto; }
    .cover-thumb__contract { font-size: 20px; font-weight: 700; color: #0A5383; text-align: center; line-height: 1.1; }
    .cover-thumb__program { font-size: 9px; font-weight: 500; color: #666; text-align: center; line-height: 1.3; }

    .cover-thumb--placeholder {
      background: rgba(255,255,255,0.04);
      border: 2px dashed rgba(255,255,255,0.15);
    }
    .cover-thumb--placeholder .cover-thumb__card {
      background: rgba(255,255,255,0.08);
    }
    .cover-thumb--placeholder .cover-thumb__contract {
      color: rgba(255,255,255,0.5);
    }
    .cover-thumb--placeholder .cover-thumb__program {
      color: rgba(255,255,255,0.3);
    }

    .top-btn {
      position: fixed;
      top: 20px;
      padding: 8px 16px;
      background: rgba(10, 83, 131, 0.6);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Gilroy', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
      z-index: 100;
    }
    .top-btn:hover {
      background: rgba(10, 83, 131, 0.9);
    }
  </style>
</head>
<body>
  <a href="index.html" class="top-btn" style="left: 20px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Collections
  </a>

  <div class="content">
    <div class="presentations">
      <a href="brochure-2025.html" class="cover-link">
        <div class="cover-thumb">
          <div class="cover-thumb__card">
            <img class="cover-thumb__logo" src="../assets/ses-logo.svg" alt="SES">
            <div class="cover-thumb__contract">Program Guide</div>
            <div class="cover-thumb__program">2025</div>
          </div>
        </div>
      </a>
      <a href="brochure-2026.html" class="cover-link">
        <div class="cover-thumb">
          <div class="cover-thumb__card">
            <img class="cover-thumb__logo" src="../assets/ses-logo.svg" alt="SES">
            <div class="cover-thumb__contract">Program Guide</div>
            <div class="cover-thumb__program">2026</div>
          </div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
