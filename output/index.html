<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>SES Presentation Manager</title>
  <style>
    @font-face { font-family: 'Gilroy'; src: url('../fonts/Gilroy-Regular.otf'); font-weight: 400; }
    @font-face { font-family: 'Gilroy'; src: url('../fonts/Gilroy-Medium.otf'); font-weight: 500; }
    @font-face { font-family: 'Gilroy'; src: url('../fonts/Gilroy-SemiBold.otf'); font-weight: 600; }
    @font-face { font-family: 'Gilroy'; src: url('../fonts/Gilroy-Bold.otf'); font-weight: 700; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Gilroy', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .page-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    .collections {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .collection-card {
      width: 380px;
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .collection-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .collection-card__header {
      padding: 28px 24px 20px;
      background: rgba(10,83,131,0.15);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .collection-card__city {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .collection-card__date {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
    }

    .collection-card__body {
      padding: 20px 24px;
    }

    .collection-card__meta {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .collection-card__stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .collection-card__stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .collection-card__stat-label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
    }

    .collection-card__actions {
      display: flex;
      gap: 10px;
    }

    .collection-card__btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 8px;
      font-family: 'Gilroy', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
      cursor: pointer;
      border: none;
    }

    .collection-card__btn--primary {
      background: rgba(10,83,131,0.6);
      color: #fff;
    }
    .collection-card__btn--primary:hover {
      background: rgba(10,83,131,0.9);
    }

    .collection-card__btn--secondary {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
    }
    .collection-card__btn--secondary:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .collection-card__btn--pdf {
      background: rgba(233,113,33,0.25);
      color: rgba(255,255,255,0.85);
    }
    .collection-card__btn--pdf:hover {
      background: rgba(233,113,33,0.5);
      color: #fff;
    }
    .collection-card__btn--pdf.is-loading {
      pointer-events: none;
      opacity: 0.7;
    }
    .collection-card__btn--pdf .pdf-spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .collection-card__btn--pdf.is-loading .pdf-icon { display: none; }
    .collection-card__btn--pdf.is-loading .pdf-spinner { display: block; }
    .collection-card__btn--pdf.is-loading .pdf-label { content: ''; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="page-title">SES Presentation Manager</div>

  <div class="collections">

    <div class="collection-card">
      <div class="collection-card__header">
        <div class="collection-card__city">London</div>
        <div class="collection-card__date">March 2026</div>
      </div>
      <div class="collection-card__body">
        <div class="collection-card__meta">
          <div class="collection-card__stat">
            <div class="collection-card__stat-value">6</div>
            <div class="collection-card__stat-label">Presentations</div>
          </div>
          <div class="collection-card__stat">
            <div class="collection-card__stat-value">5</div>
            <div class="collection-card__stat-label">Contracts</div>
          </div>
        </div>
        <div class="collection-card__actions">
          <a href="london-index.html" class="collection-card__btn collection-card__btn--primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
            Presentations
          </a>
          <a href="data-pipeline.html?collection=london" class="collection-card__btn collection-card__btn--secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Data
          </a>
          <button onclick="downloadPDFs('london', this)" class="collection-card__btn collection-card__btn--pdf">
            <svg class="pdf-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <div class="pdf-spinner"></div>
            <span class="pdf-label">PDFs</span>
          </button>
        </div>
      </div>
    </div>

    <div class="collection-card">
      <div class="collection-card__header">
        <div class="collection-card__city">Zurich</div>
        <div class="collection-card__date">March 2026</div>
      </div>
      <div class="collection-card__body">
        <div class="collection-card__meta">
          <div class="collection-card__stat">
            <div class="collection-card__stat-value">1</div>
            <div class="collection-card__stat-label">Presentations</div>
          </div>
          <div class="collection-card__stat">
            <div class="collection-card__stat-value">1</div>
            <div class="collection-card__stat-label">Contracts</div>
          </div>
        </div>
        <div class="collection-card__actions">
          <a href="zurich-index.html" class="collection-card__btn collection-card__btn--primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
            Presentations
          </a>
          <a href="data-pipeline.html?collection=zurich" class="collection-card__btn collection-card__btn--secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Data
          </a>
          <button onclick="downloadPDFs('zurich', this)" class="collection-card__btn collection-card__btn--pdf">
            <svg class="pdf-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <div class="pdf-spinner"></div>
            <span class="pdf-label">PDFs</span>
          </button>
        </div>
      </div>
    </div>

  </div>

  <script>
    async function downloadPDFs(collection, btn) {
      const label = btn.querySelector('.pdf-label');
      const originalText = label.textContent;
      btn.classList.add('is-loading');
      label.textContent = 'Generating...';

      try {
        const resp = await fetch(`/api/pdf/${collection}`);
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ error: resp.statusText }));
          throw new Error(err.error || 'Download failed');
        }

        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${collection}-presentations.zip`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert(`PDF generation failed: ${err.message}`);
      } finally {
        btn.classList.remove('is-loading');
        label.textContent = originalText;
      }
    }
  </script>
</body>
</html>
