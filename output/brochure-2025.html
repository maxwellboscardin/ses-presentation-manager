<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Program Guide 2025 — SES Risk Solutions</title>
  <style>
    @font-face { font-family: 'Gilroy'; src: url('../fonts/Gilroy-Regular.otf'); font-weight: 400; }
    @font-face { font-family: 'Gilroy'; src: url('../fonts/Gilroy-SemiBold.otf'); font-weight: 600; }
    @font-face { font-family: 'Gilroy'; src: url('../fonts/Gilroy-Bold.otf'); font-weight: 700; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Gilroy', sans-serif;
      background: #1a1a2e;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Nav arrows (matches .pres-nav) ── */
    .pres-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      background: rgba(10, 83, 131, 0.7);
      color: #fff;
      border: none;
      width: 48px;
      height: 80px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, opacity 0.15s;
      opacity: 0.6;
    }
    .pres-nav:hover {
      background: rgba(10, 83, 131, 0.95);
      opacity: 1;
    }
    .pres-nav:disabled {
      opacity: 0.15;
      cursor: default;
      pointer-events: none;
    }
    .pres-nav--prev {
      left: 0;
      border-radius: 0 8px 8px 0;
    }
    .pres-nav--next {
      right: 0;
      border-radius: 8px 0 0 8px;
    }
    .pres-nav svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Dots (matches .pres-dots) ── */
    .pres-dots {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 200;
      background: rgba(10, 83, 131, 0.6);
      padding: 8px 16px;
      border-radius: 20px;
    }
    .pres-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s, transform 0.2s;
    }
    .pres-dot:hover {
      background: rgba(255, 255, 255, 0.6);
    }
    .pres-dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* ── Download button (discreet, bottom-right) ── */
    .download-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.4);
      border: none;
      border-radius: 6px;
      font-family: 'Gilroy', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .download-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
    }
    .download-btn svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Spread viewer ── */
    .spread-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
    }

    .spread-container canvas {
      flex-shrink: 0;
    }

    /* Spine shadows */
    .spread-container.is-spread canvas:first-child {
      box-shadow: -2px 2px 12px rgba(0, 0, 0, 0.15);
    }
    .spread-container.is-spread canvas:last-child {
      box-shadow: 2px 2px 12px rgba(0, 0, 0, 0.15);
    }
    .spread-container.is-single canvas {
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
    }

    /* Loading */
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>

  <div class="loading" id="loading">Loading brochure...</div>

  <button class="pres-nav pres-nav--prev" id="prevBtn" disabled>
    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <button class="pres-nav pres-nav--next" id="nextBtn">
    <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
  </button>

  <div class="pres-dots" id="dots"></div>

  <a href="../assets/brochure/program-guide-2025.pdf" download class="download-btn">
    <svg viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download PDF
  </a>

  <div id="viewer"></div>

  <script type="module">
    const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

    const PDF_URL = '../assets/brochure/program-guide-2025.pdf';
    const PAGE_W = 816;  // 8.5in at 96dpi
    const PAGE_H = 1056; // 11in at 96dpi

    let pdfDoc = null;
    let sections = [];   // [{pages: [1]}, {pages: [2,3]}, ...]
    let currentIndex = 0;
    let rendering = false;
    let renderedCanvases = new Map(); // pageNum -> canvas

    async function loadPDF() {
      pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
      const total = pdfDoc.numPages;

      // Build sections: page 1 = single cover, then pairs as spreads
      sections.push({ pages: [1] });
      for (let i = 2; i <= total; i += 2) {
        if (i + 1 <= total) {
          sections.push({ pages: [i, i + 1] });
        } else {
          sections.push({ pages: [i] });
        }
      }

      // Pre-render all pages
      for (let p = 1; p <= total; p++) {
        await renderPageToCanvas(p);
      }

      buildDots();
      document.getElementById('loading').style.display = 'none';
      showSection(0);
    }

    async function renderPageToCanvas(pageNum) {
      const page = await pdfDoc.getPage(pageNum);
      const dpr = window.devicePixelRatio || 1;
      const viewport = page.getViewport({ scale: 1 });

      // Scale to match our target page size
      const scale = (PAGE_W / viewport.width) * dpr;
      const scaledViewport = page.getViewport({ scale });

      const canvas = document.createElement('canvas');
      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;
      canvas.style.width = PAGE_W + 'px';
      canvas.style.height = PAGE_H + 'px';

      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;

      renderedCanvases.set(pageNum, canvas);
    }

    function showSection(index) {
      if (index < 0 || index >= sections.length) return;
      currentIndex = index;

      // Clear old
      const viewer = document.getElementById('viewer');
      viewer.innerHTML = '';

      const section = sections[index];
      const isSpread = section.pages.length === 2;

      const container = document.createElement('div');
      container.className = `spread-container ${isSpread ? 'is-spread' : 'is-single'}`;

      section.pages.forEach(p => {
        const canvas = renderedCanvases.get(p);
        if (canvas) container.appendChild(canvas);
      });

      viewer.appendChild(container);
      autoScale();
      updateNav();
    }

    function autoScale() {
      const container = document.querySelector('.spread-container');
      if (!container) return;

      const section = sections[currentIndex];
      const isSpread = section.pages.length === 2;
      const contentW = (isSpread ? PAGE_W * 2 : PAGE_W) + 48;
      const contentH = PAGE_H + 48;
      const scale = Math.min(window.innerWidth / contentW, window.innerHeight / contentH, 1);
      container.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    function updateNav() {
      document.getElementById('prevBtn').disabled = currentIndex === 0;
      document.getElementById('nextBtn').disabled = currentIndex === sections.length - 1;

      document.querySelectorAll('.pres-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });
    }

    function buildDots() {
      const container = document.getElementById('dots');
      sections.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = 'pres-dot';
        dot.addEventListener('click', () => showSection(i));
        container.appendChild(dot);
      });
    }

    function goNext() { showSection(currentIndex + 1); }
    function goPrev() { showSection(currentIndex - 1); }

    document.getElementById('nextBtn').addEventListener('click', goNext);
    document.getElementById('prevBtn').addEventListener('click', goPrev);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
    });

    window.addEventListener('resize', () => autoScale());

    loadPDF();
  </script>
</body>
</html>
