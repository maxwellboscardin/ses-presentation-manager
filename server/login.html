<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SES Presentations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }
    .header { margin-bottom: 1.5rem; }
    h1 { font-size: 1.25rem; font-weight: 600; color: #1d1d1f; }
    .subtitle { font-size: 0.875rem; color: #86868b; margin-top: 0.25rem; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 0.75rem; font-weight: 500; color: #86868b; margin-bottom: 0.25rem; }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      border: 1px solid #d2d2d7;
      border-radius: 0.75rem;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
    }
    .error {
      color: #ff3b30;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error.show { display: block; }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #0077ed; }
    button:disabled { opacity: 0.5; cursor: default; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card" id="loginCard">
    <div class="header">
      <h1>SES Presentations</h1>
      <p class="subtitle">Sign in to continue</p>
    </div>
    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your first name" autofocus autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <p class="error" id="loginError"></p>
      <button type="submit" id="loginBtn">Sign in</button>
    </form>
  </div>

  <div class="card hidden" id="changeCard">
    <div class="header">
      <h1>Set a new password</h1>
      <p class="subtitle">Change your temporary password before continuing.</p>
    </div>
    <form id="changeForm">
      <div class="field">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" placeholder="At least 6 characters">
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" placeholder="Type it again">
      </div>
      <p class="error" id="changeError"></p>
      <button type="submit" id="changeBtn">Set password</button>
    </form>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    $('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = $('loginError');
      err.classList.remove('show');
      $('loginBtn').disabled = true;
      $('loginBtn').textContent = 'Signing in\u2026';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: $('username').value, password: $('password').value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        if (data.user.must_change_password) {
          $('loginCard').classList.add('hidden');
          $('changeCard').classList.remove('hidden');
          $('newPassword').focus();
        } else {
          window.location.href = '/';
        }
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.add('show');
      } finally {
        $('loginBtn').disabled = false;
        $('loginBtn').textContent = 'Sign in';
      }
    });

    $('changeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = $('changeError');
      err.classList.remove('show');
      const pw = $('newPassword').value;
      const confirm = $('confirmPassword').value;

      if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters'; err.classList.add('show'); return; }
      if (pw !== confirm) { err.textContent = 'Passwords do not match'; err.classList.add('show'); return; }

      $('changeBtn').disabled = true;
      $('changeBtn').textContent = 'Saving\u2026';

      try {
        const res = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ new_password: pw }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        window.location.href = '/';
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.add('show');
      } finally {
        $('changeBtn').disabled = false;
        $('changeBtn').textContent = 'Set password';
      }
    });
  </script>
</body>
</html>
